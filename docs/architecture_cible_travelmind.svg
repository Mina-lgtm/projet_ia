<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="680" viewBox="0 0 1300 680">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #4b5563; }
      .box-title { font: 700 16px Arial, sans-serif; fill: #111827; }
      .box-text { font: 400 13px Arial, sans-serif; fill: #374151; }
      .small { font: 400 12px Arial, sans-serif; fill: #4b5563; }
      .box { fill: #f9fafb; stroke: #9ca3af; stroke-width: 1.5; rx: 14; }
      .data { fill: #eff6ff; stroke: #2563eb; }
      .model { fill: #ecfdf5; stroke: #059669; }
      .serve { fill: #f5f3ff; stroke: #7c3aed; }
      .monitor { fill: #fff7ed; stroke: #ea580c; }
      .govern { fill: #fef2f2; stroke: #dc2626; }
      .arrow { stroke: #374151; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
      .arrow-dashed { stroke: #6b7280; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrowhead-gray); }
      .label { font: 700 13px Arial, sans-serif; fill: #1f2937; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#374151" />
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280" />
