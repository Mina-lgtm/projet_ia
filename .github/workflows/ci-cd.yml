name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate Python package
        run: |
          python -m compileall app tests train.py

      - name: Run API tests
        run: |
          pytest -q

      - name: Train model for quality gate
        run: |
          python train.py --model-path models/model_pre_voyage_ci.pkl --metadata-path models/model_pre_voyage_ci_metadata.json

      - name: Check model quality gate
        run: |
          python scripts/check_model_quality.py --metadata-path models/model_pre_voyage_ci_metadata.json --config-path configs/model_quality_gate.json

      - name: Validate final notebook structure
        run: |
          python - <<'PY'
          import ast
          import json
          from pathlib import Path

          notebook_path = Path("notebooks/00_notebook_final_pre_post_voyage.ipynb")
          notebook = json.loads(notebook_path.read_text(encoding="utf-8"))

          assert notebook["cells"], "Notebook has no cells"

          for index, cell in enumerate(notebook["cells"]):
              if cell.get("cell_type") != "code":
                  continue
              source = "".join(cell.get("source", []))
              ast.parse(source, filename=f"{notebook_path}:cell-{index}")

          print("Notebook JSON and code syntax are valid")
          PY

      - name: Build Docker image
        run: |
          docker build -t examen-ia:${{ github.sha }} .
